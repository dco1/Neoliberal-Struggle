<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neoliberal Struggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="title-block">
        <h1>Neoliberal Struggle</h1>
        <span id="market-status" class="badge badge-closed">Market Closed</span>
      </div>
      <div class="header-meta">
        <span id="cycle-count">Cycle: —</span>
        <span id="last-updated">—</span>
      </div>
    </div>
  </header>

  <main>
    <!-- Struggle Dial -->
    <section class="dial-section">
      <div class="dial-label left">Woke <span id="woke-weight-display">40%</span></div>
      <div class="dial-wrapper">
        <input type="range" id="struggle-dial" min="0" max="100" value="40" step="5">
        <div class="dial-ticks">
          <span>Pure Ethics</span>
          <span>The Struggle</span>
          <span>Pure Greed</span>
        </div>
      </div>
      <div class="dial-label right">Returns <span id="fin-weight-display">60%</span></div>
      <button id="save-weights" class="btn-save">Save</button>
    </section>

    <!-- Books Grid -->
    <section class="books-grid">
      <div class="book-card" id="book-index">
        <div class="book-header">
          <div>
            <h2>Book A</h2>
            <p class="book-subtitle">Index Universe — Ethics First</p>
          </div>
          <div class="book-status" id="index-status">
            <span class="badge badge-active">Active</span>
            <button class="btn-pause" data-book="index">Pause</button>
          </div>
        </div>
        <div class="book-stats">
          <div class="stat">
            <label>Portfolio Value</label>
            <value id="index-value">—</value>
          </div>
          <div class="stat">
            <label>P&amp;L</label>
            <value id="index-pnl" class="neutral">—</value>
          </div>
          <div class="stat">
            <label>Positions</label>
            <value id="index-positions">—</value>
          </div>
          <div class="stat">
            <label>Avg Woke Score</label>
            <value id="index-woke">—</value>
          </div>
        </div>
        <canvas id="index-chart" height="120"></canvas>
        <div class="book-tabs">
          <button class="tab active" data-book="index" data-tab="holdings">Holdings</button>
          <button class="tab" data-book="index" data-tab="trades">Trades</button>
          <button class="tab" data-book="index" data-tab="log">Agent Log</button>
        </div>
        <div class="tab-content" id="index-tab-content"></div>
      </div>

      <div class="book-card" id="book-screener">
        <div class="book-header">
          <div>
            <h2>Book B</h2>
            <p class="book-subtitle">Screener Universe — Financials First</p>
          </div>
          <div class="book-status" id="screener-status">
            <span class="badge badge-active">Active</span>
            <button class="btn-pause" data-book="screener">Pause</button>
          </div>
        </div>
        <div class="book-stats">
          <div class="stat">
            <label>Portfolio Value</label>
            <value id="screener-value">—</value>
          </div>
          <div class="stat">
            <label>P&amp;L</label>
            <value id="screener-pnl" class="neutral">—</value>
          </div>
          <div class="stat">
            <label>Positions</label>
            <value id="screener-positions">—</value>
          </div>
          <div class="stat">
            <label>Avg Woke Score</label>
            <value id="screener-woke">—</value>
          </div>
        </div>
        <canvas id="screener-chart" height="120"></canvas>
        <div class="book-tabs">
          <button class="tab active" data-book="screener" data-tab="holdings">Holdings</button>
          <button class="tab" data-book="screener" data-tab="trades">Trades</button>
          <button class="tab" data-book="screener" data-tab="log">Agent Log</button>
        </div>
        <div class="tab-content" id="screener-tab-content"></div>
      </div>
    </section>

    <!-- Manual trigger (dev) -->
    <section class="dev-controls">
      <button id="trigger-cycle" class="btn-trigger">Trigger Agent Cycle Now</button>
      <span id="trigger-status"></span>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
